name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip check
      - name: Check formatting
        run: python -m black --check src tests main.py
      - name: Lint
        run: python -m flake8 src tests main.py
      - name: Type check
        run: python -m mypy
      - name: Run tests with coverage
        run: MPLCONFIGDIR=/tmp/matplotlib python -m pytest -vv
      - name: Generate example report
        run: MPLCONFIGDIR=/tmp/matplotlib python main.py --input data/raw/sample_ran_kpi_data.csv --output reports/example_report.html
