name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - name: Install dependencies
        run: |
          uv sync --frozen --all-groups
      - name: Check formatting
        run: uv run ruff format --check .
      - name: Lint
        run: uv run ruff check .
      - name: Type check
        run: uv run mypy src
      - name: Run tests with coverage
        run: MPLCONFIGDIR=/tmp/matplotlib uv run pytest -vv
      - name: Generate example report
        run: MPLCONFIGDIR=/tmp/matplotlib uv run python main.py --input data/raw/sample_ran_kpi_data.csv --output reports/example_report.html
      - name: Build Docker image
        run: docker build -t ran-kpi-analyzer .
      - name: Run Docker image
        run: docker run --rm ran-kpi-analyzer
