repos:
  - repo: local
    hooks:
      - id: black
        name: black
        entry: uv run python -m black
        language: system
        types_or: [python, pyi]
      - id: ruff
        name: ruff
        entry: uv run python -m ruff check --fix
        language: system
        types_or: [python, pyi]
      - id: mypy
        name: mypy
        entry: uv run python -m mypy
        language: system
        pass_filenames: false
